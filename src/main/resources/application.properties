spring.application.name=secure-eshop
spring.ssl.bundle.jks.secure-eshop.key.alias=eshop
spring.ssl.bundle.jks.secure-eshop.keystore.location=classpath:keystore.p12
spring.ssl.bundle.jks.secure-eshop.keystore.password=${secure_eshop_keystore_password}
spring.ssl.bundle.jks.secure-eshop.keystore.type=PKCS12
server.ssl.bundle=secure-eshop
server.port=8443

spring.datasource.url=jdbc:h2:mem:eshopdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=vasilis944@gmail.com
spring.mail.password=${mail_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-message=never
server.error.include-binding-errors=never